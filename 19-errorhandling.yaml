- name: error handling
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: check user roboshop exists or not
    ansible.builtin.command: id roboshop
    register: user_output

  - name: user output
    ansible.builtin.debug:
      msg: "{{ user_output }}"

  - name: create roboshop user
    ansible.builtin.command: useradd roboshop
    when: user_output != 0